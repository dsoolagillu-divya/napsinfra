{% extends ;main.html %}
{% load static %}
{% block content %}
<h1>New Password</h1>
<center>
    {% if error %}
    <h1>New password should not be same as old password</h1>
    {% endif %}
    <form action="" method="POST">
        {% csrf_token %}
        <label for="">Enter New Password:</label>
        <input type="password" name="password" id="">
        <br><br>
        <button type="submit">Submit</button>
    </form>
</center>
{% endblock %}
